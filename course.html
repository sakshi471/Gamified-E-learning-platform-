<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-1: #0d1023;
            --bg-2: #1a1f45;
            --panel: rgba(255, 255, 255, 0.08);
            --panel-border: rgba(255, 255, 255, 0.16);
            --text: #eef2ff;
            --muted: #b9c2ff;
            --accent: #ffc95e;
            --easy: #4ade80;
            --medium: #f59e0b;
            --hard: #f43f5e;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Sora", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 10%, rgba(94, 234, 212, 0.18), transparent 32%),
                radial-gradient(circle at 90% 15%, rgba(244, 63, 94, 0.16), transparent 26%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
            display: grid;
            grid-template-columns: 320px 1fr;
        }

        .sidebar {
            padding: 20px;
            background: rgba(10, 14, 32, 0.9);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            overflow-y: auto;
        }

        .course-title {
            font-family: "Orbitron", sans-serif;
            font-size: 1.1rem;
            margin: 0 0 4px;
        }

        .course-meta {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .xp-summary {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 14px;
            font-size: 0.9rem;
        }

        .lesson-item {
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .lesson-item:hover { transform: translateX(4px); }

        .lesson-item.active {
            background: linear-gradient(135deg, rgba(103, 133, 255, 0.45), rgba(204, 109, 255, 0.45));
            border-color: rgba(255, 255, 255, 0.32);
        }

        .lesson-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            font-size: 0.86rem;
            font-weight: 600;
        }

        .difficulty-tag {
            padding: 2px 7px;
            border-radius: 999px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .difficulty-easy { background: rgba(74, 222, 128, 0.2); color: #bff6d3; }
        .difficulty-medium { background: rgba(245, 158, 11, 0.2); color: #ffe2a8; }
        .difficulty-hard { background: rgba(244, 63, 94, 0.2); color: #ffc0cc; }

        .lesson-sub {
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .main {
            padding: 26px;
            overflow-y: auto;
        }

        .top-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #facc15, #fb923c);
            transition: width 0.35s ease;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.35fr 1fr;
            gap: 14px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 16px;
        }

        .panel h2, .panel h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .objective {
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: 10px;
        }

        .challenge-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.28);
            background: rgba(4, 8, 26, 0.38);
        }

        input, textarea, select {
            width: 100%;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 10px;
            margin-top: 8px;
            font-family: "Sora", sans-serif;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffcb56, #ff8843);
            color: #1b2044;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .status {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #d8e0ff;
            min-height: 20px;
        }

        .enroll-gate {
            display: none;
            background: rgba(22, 11, 44, 0.74);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 14px;
        }

        @media (max-width: 980px) {
            body { grid-template-columns: 1fr; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <h1 class="course-title" id="sidebarCourseTitle">Loading Course...</h1>
        <div id="sidebarMeta" class="course-meta">Preparing your learning quest...</div>

        <div class="xp-summary" id="xpSummary">Lesson XP: 0</div>
        <div id="lessonList"></div>

        <div class="actions">
            <button class="btn-secondary" onclick="goBack()">Back to Courses</button>
        </div>
    </aside>

    <main class="main">
        <section id="enrollGate" class="enroll-gate">
            <h2>Enrollment Required</h2>
            <p>You need to enroll before opening lessons for this course.</p>
            <button class="btn-primary" onclick="enrollAndLoad()">Enroll +20 XP</button>
            <div id="enrollStatus" class="status"></div>
        </section>

        <section class="top-card">
            <strong id="courseHeader">Course Mission</strong>
            <p id="courseAbout" class="objective"></p>
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressMeta" class="status"></div>
        </section>

        <section class="content-grid">
            <article class="panel">
                <h2 id="lessonTitle">Loading lesson...</h2>
                <p id="lessonContent"></p>
                <p id="lessonObjective" class="objective"></p>

                <div class="challenge-box">
                    <h3>Lesson Challenge</h3>
                    <div id="challengePrompt">Loading challenge...</div>
                    <input id="challengeAnswer" placeholder="Type your answer">
                    <div class="actions">
                        <button class="btn-primary" onclick="submitChallenge()">Submit Challenge</button>
                        <button class="btn-secondary" onclick="nextLesson()">Next Lesson</button>
                    </div>
                    <div id="challengeStatus" class="status"></div>
                </div>
            </article>

            <aside class="panel">
                <h3>Your Input Zone</h3>
                <label for="notesInput">Reflection / Notes</label>
                <textarea id="notesInput" rows="6" placeholder="Write what you learned in your own words..."></textarea>
                <div class="actions">
                    <button class="btn-secondary" onclick="saveNotes()">Save Notes</button>
                </div>
                <div id="noteStatus" class="status"></div>

                <hr style="border-color: rgba(255,255,255,0.14); margin: 14px 0;">

                <h3>Rate This Course</h3>
                <select id="ratingInput">
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Average</option>
                    <option value="2">2 - Needs work</option>
                    <option value="1">1 - Poor</option>
                </select>
                <div class="actions">
                    <button class="btn-secondary" onclick="submitRating()">Submit Rating</button>
                </div>
                <div id="ratingStatus" class="status"></div>
            </aside>
        </section>
    </main>

<script>
    const API = "http://127.0.0.1:8000";
    const token = localStorage.getItem("access_token");
    const courseId = new URLSearchParams(window.location.search).get("id");

    const lessonState = {
        course: null,
        lessons: [],
        currentIndex: 0,
        completed: new Set(),
        challengeUnlocked: false,
        lastExpectedAnswer: ""
    };

    const XP_BY_DIFFICULTY = {
        easy: 15,
        medium: 25,
        hard: 40
    };

    if (!token) {
        window.location.href = "login.html";
    }

    function normalizeComplexity(level) {
        const c = (level || "easy").toLowerCase();
        if (c.includes("adv") || c.includes("hard")) return "hard";
        if (c.includes("inter")) return "medium";
        return "easy";
    }

    function assignDifficulty(index, total, baseComplexity) {
        if (total <= 1) return normalizeComplexity(baseComplexity);
        const ratio = (index + 1) / total;
        if (ratio <= 0.35) return "easy";
        if (ratio <= 0.75) return "medium";
        return "hard";
    }

    function getSavedPreviewLessons() {
        try {
            const raw = localStorage.getItem(`course_lessons_${courseId}`);
            if (!raw) return [];
            return JSON.parse(raw);
        } catch {
            return [];
        }
    }

    async function fetchCourseMeta() {
        try {
            const raw = localStorage.getItem(`course_meta_${courseId}`);
            if (raw) return JSON.parse(raw);
        } catch {}

        const res = await fetch(`${API}/courses/${courseId}`);
        if (!res.ok) return null;
        return await res.json();
    }

    async function checkEnrollment() {
        const res = await fetch(`${API}/courses/`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) return false;

        const courses = await res.json();
        const course = courses.find(c => c.id === courseId);
        return !!course?.enrolled;
    }

    async function enrollAndLoad() {
        const status = document.getElementById("enrollStatus");
        status.innerText = "Enrolling...";

        const res = await fetch(`${API}/courses/${courseId}/enroll`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (!res.ok) {
            status.innerText = data.detail || "Enrollment failed.";
            return;
        }

        status.innerText = data.message || "Enrolled successfully.";
        document.getElementById("enrollGate").style.display = "none";
        await loadLessons();
    }

    function loadCompletionFromStorage() {
        const key = `course_completed_${courseId}`;
        try {
            const ids = JSON.parse(localStorage.getItem(key) || "[]");
            ids.forEach(id => lessonState.completed.add(id));
        } catch {}
    }

    function persistCompletion() {
        const key = `course_completed_${courseId}`;
        localStorage.setItem(key, JSON.stringify([...lessonState.completed]));
    }

    function renderLessonList() {
        const container = document.getElementById("lessonList");

        container.innerHTML = lessonState.lessons.map((lesson, index) => {
            const activeClass = index === lessonState.currentIndex ? "active" : "";
            const completed = lessonState.completed.has(lesson.id) ? " Completed" : " Pending";
            const diffClass = `difficulty-${lesson.difficulty}`;

            return `
                <div class="lesson-item ${activeClass}" onclick="showLesson(${index})" id="lesson-${index}">
                    <div class="lesson-top">
                        <span>${index + 1}. ${lesson.title}</span>
                        <span class="difficulty-tag ${diffClass}">${lesson.difficulty}</span>
                    </div>
                    <div class="lesson-sub">+${lesson.xp} XP | ${completed}</div>
                </div>
            `;
        }).join("");

        const totalXP = lessonState.lessons.reduce((sum, l) => sum + l.xp, 0);
        document.getElementById("xpSummary").innerText =
            `Lesson XP pool: ${totalXP} | Completed: ${lessonState.completed.size}/${lessonState.lessons.length}`;
    }

    function buildChallengeForLesson(lesson) {
        const words = `${lesson.title} ${lesson.content || ""}`
            .toLowerCase()
            .replace(/[^a-z0-9\s]/g, " ")
            .split(/\s+/)
            .filter(w => w.length > 4);

        const keyword = words[0] || lesson.title.split(" ")[0].toLowerCase();
        return {
            prompt: `Type this keyword to complete the quest: ${keyword}`,
            expected: keyword
        };
    }

    async function showLesson(index) {
        lessonState.currentIndex = index;
        lessonState.challengeUnlocked = false;

        document.querySelectorAll(".lesson-item").forEach(el => el.classList.remove("active"));
        const active = document.getElementById(`lesson-${index}`);
        if (active) active.classList.add("active");

        const lesson = lessonState.lessons[index];
        document.getElementById("lessonTitle").innerText = lesson.title;
        document.getElementById("lessonContent").innerText = lesson.content;
        document.getElementById("lessonObjective").innerText =
            `Objective: Complete this ${lesson.difficulty} lesson quest to earn +${lesson.xp} XP.`;

        const challenge = buildChallengeForLesson(lesson);
        lessonState.lastExpectedAnswer = challenge.expected;
        document.getElementById("challengePrompt").innerText = challenge.prompt;
        document.getElementById("challengeAnswer").value = "";
        document.getElementById("challengeStatus").innerText = "";

        const savedNote = localStorage.getItem(`course_note_${courseId}_${lesson.id}`) || "";
        document.getElementById("notesInput").value = savedNote;

        updateProgressUI();
        renderLessonList();
    }

    function updateProgressUI() {
        const percent = lessonState.lessons.length
            ? (lessonState.completed.size / lessonState.lessons.length) * 100
            : 0;
        document.getElementById("progressFill").style.width = `${percent}%`;
        document.getElementById("progressMeta").innerText =
            `${lessonState.completed.size}/${lessonState.lessons.length} lessons completed`;
    }

    async function awardLessonXP(lesson) {
        await fetch(`${API}/profile/add-xp?amount=${lesson.xp}`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` }
        });
    }

    async function syncCourseProgress() {
        const increment = lessonState.lessons.length ? (100 / lessonState.lessons.length) : 0;
        await fetch(`${API}/courses/${courseId}/progress?progress_increment=${increment}`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` }
        });
    }

    async function submitChallenge() {
        const lesson = lessonState.lessons[lessonState.currentIndex];
        const answer = document.getElementById("challengeAnswer").value.trim().toLowerCase();
        const status = document.getElementById("challengeStatus");

        if (!answer) {
            status.innerText = "Enter an answer first.";
            return;
        }

        if (answer !== lessonState.lastExpectedAnswer) {
            status.innerText = "Not correct. Read lesson and retry.";
            return;
        }

        const firstCompletion = !lessonState.completed.has(lesson.id);
        if (firstCompletion) {
            lessonState.completed.add(lesson.id);
            persistCompletion();
            await awardLessonXP(lesson);
            await syncCourseProgress();
            confetti({ particleCount: 70, spread: 70 });
            status.innerText = `Quest complete. +${lesson.xp} XP awarded.`;
        } else {
            status.innerText = "Already completed earlier. You can continue.";
        }

        lessonState.challengeUnlocked = true;
        updateProgressUI();
        renderLessonList();
    }

    function nextLesson() {
        if (!lessonState.challengeUnlocked && !lessonState.completed.has(lessonState.lessons[lessonState.currentIndex].id)) {
            document.getElementById("challengeStatus").innerText =
                "Complete this lesson challenge before moving on.";
            return;
        }

        if (lessonState.currentIndex < lessonState.lessons.length - 1) {
            showLesson(lessonState.currentIndex + 1);
            return;
        }

        document.getElementById("challengeStatus").innerText = "Course complete. Great run.";
        confetti({ particleCount: 180, spread: 110 });
    }

    function saveNotes() {
        const lesson = lessonState.lessons[lessonState.currentIndex];
        const note = document.getElementById("notesInput").value;
        localStorage.setItem(`course_note_${courseId}_${lesson.id}`, note);
        document.getElementById("noteStatus").innerText = "Notes saved.";
    }

    async function submitRating() {
        const value = Number(document.getElementById("ratingInput").value);
        const status = document.getElementById("ratingStatus");

        const res = await fetch(`${API}/courses/${courseId}/rate`, {
            method: "POST",
            headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ rating: value })
        });

        const data = await res.json();
        if (!res.ok) {
            status.innerText = data.detail || "Unable to submit rating.";
            return;
        }

        status.innerText = `Thanks. New average rating: ${data.new_average_rating}`;
    }

    function goBack() {
        window.location.href = "courses.html";
    }

    async function loadLessons() {
        const res = await fetch(`${API}/courses/${courseId}/lessons`, {
            headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
            document.getElementById("enrollGate").style.display = "block";
            return;
        }

        const raw = await res.json();
        const preview = getSavedPreviewLessons();

        lessonState.lessons = raw.map((l, idx) => {
            const previewLesson = preview[idx] || {};
            const difficulty = previewLesson.difficulty || assignDifficulty(idx, raw.length, lessonState.course?.complexity);
            return {
                ...l,
                difficulty,
                xp: XP_BY_DIFFICULTY[difficulty]
            };
        });

        if (!lessonState.lessons.length) {
            const fallback = getSavedPreviewLessons();
            lessonState.lessons = fallback.map((l, idx) => ({
                id: l.id || `fallback-${idx + 1}`,
                title: l.title || `Lesson ${idx + 1}`,
                content: l.content || "Lesson content coming soon.",
                difficulty: l.difficulty || "easy",
                xp: l.xp || XP_BY_DIFFICULTY[l.difficulty || "easy"]
            }));
        }

        loadCompletionFromStorage();
        renderLessonList();
        showLesson(0);
    }

    async function init() {
        if (!courseId) {
            window.location.href = "courses.html";
            return;
        }

        lessonState.course = await fetchCourseMeta();

        document.getElementById("sidebarCourseTitle").innerText = lessonState.course?.title || "Course";
        document.getElementById("sidebarMeta").innerText =
            `${lessonState.course?.duration_hours || 0} hours | Rating ${lessonState.course?.rating || 0} | ${lessonState.course?.complexity || "beginner"}`;

        document.getElementById("courseHeader").innerText = lessonState.course?.title || "Course Mission";
        document.getElementById("courseAbout").innerText = lessonState.course?.description || "Learn through interactive quests and challenge inputs.";

        const enrolled = await checkEnrollment();
        if (!enrolled) {
            document.getElementById("enrollGate").style.display = "block";
            return;
        }

        await loadLessons();
    }

    init();
</script>
</body>
</html>
